workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      groups: []  # أضف هنا أي مجموعات متغيرات تحتاجها
      vars:
        JAVA_HOME: "/usr/lib/jvm/java-17-openjdk-amd64"  # المسار الصحيح لـ Java 17 في Codemagic
    scripts:
      - name: Install Android SDK
        script: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - name: Build APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs//*.apk
